      - name: act_net
        input: ACTIONS
        layers: [512, 256, 128]
        activations: elu
      - name: net
        input: concatenate([features_extractor, net_pos, net_quat, act_net])
        layers: [512, 256, 128]
        activations: elu
    output: ONE
  target_critic_2:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
