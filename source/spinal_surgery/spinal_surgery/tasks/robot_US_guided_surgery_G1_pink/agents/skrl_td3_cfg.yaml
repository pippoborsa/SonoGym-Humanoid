seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:  # see gaussian_model parameters
    class: DeterministicMixin # CategoricalMixin # 
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: features_extractor
        input: STATES["image"]  # PyTorch NHWC -> NCHW
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
        activations: relu
      - name: net_pos
        input: STATES["pos"]
        layers: [128, 128, 64]
        activations: elu
      - name: net_quat
        input: STATES["quat"]
        layers: [128, 128, 64]
        activations: elu
      - name: net
        input: concatenate([features_extractor, net_pos, net_quat])
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS
  target_policy:  # see gaussian_model parameters
    class: GaussianMixin # CategoricalMixin # 
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: features_extractor
        input: STATES["image"]  # PyTorch NHWC -> NCHW
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
        activations: relu
      - name: net_pos
        input: STATES["pos"]
        layers: [128, 128, 64]
        activations: elu
      - name: net_quat
        input: STATES["quat"]
        layers: [128, 128, 64]
        activations: elu
      - name: net
        input: concatenate([features_extractor, net_pos, net_quat])
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS
  critic_1:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: features_extractor
        input: STATES["image"]  # PyTorch NHWC -> NCHW
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
        activations: relu
      - name: net_pos
        input: STATES["pos"]
        layers: [128, 128, 64]
        activations: elu
      - name: net_quat
        input: STATES["quat"]
        layers: [128, 128, 64]
        activations: elu
      - name: act_net
        input: ACTIONS
        layers: [512, 256, 128]
        activations: elu
      - name: net
        input: concatenate([features_extractor, net_pos, net_quat, act_net])
        layers: [512, 256, 128]
        activations: elu
    output: ONE
  critic_2:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: features_extractor
        input: STATES["image"]  # PyTorch NHWC -> NCHW
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
