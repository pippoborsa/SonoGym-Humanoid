use_wandb: True

robot:
  type: 'g1'
  side: 'left' # 'left' or 'right'

g1: 
  pos: [0.1, -0.7, 1.1]
  yaw: 90.0
  height: 0.13 # +0.01
  height_img: 0.137 # +0.01

h1: 
  pos: [0.03, -0.86, 0.93]
  yaw: 90.0
  height: 0.193 
  height_img: 0.20 

patient:
  pos: [0.2, -0.55, 1.10]
  euler_yxz: [-90.0, -80.0, 0.0]
  id_list: ['s0010'] #['s0015', 's0024', 's0028', 's0029', 's0030'] # ['s0010'] # 's0010', 's0014', 's0015'
  label_res: 0.0015 # m
  target_anatomy: 'vertebrae_L4'

bed:
  pos: [0.0, -0.15, 0.5]
  euler_xyz: [90, 0.0, 90]
  scale: 0.0008

motion_planning:
  joint_pos_rand_max: [0.1, 0.1, 0.1, 0.05, 0.1, 0.1, 0.05, 0.1, 0.1, 0.0] # ultimo 0.05 per g1
  vertebra_to_US_2d_pos: [-30.0, 0.0] # [-30, 0.0]
  US_roll_adj: -0.4   #-0.4
  vertebra_to_US_rand_max: 5.0 # 10.0
  US_roll_rand_max: 0.1
  scale: [[2, 2, 0.1]]

observation: 
  3D: True
  downsample: 4
  mode: 'US' # 'seg', 'CT', 'US'
  scale: 0.02 # 0.1, 0.0005, 0.1 for learning-based, 0.02 for model-based
  scale_net: 0.1

action: 
  mode: 'continuous' # 'discrete', 'continuous'
  scale: [0.06, 0.06, 0.06, 0.3, 0.3]  # [0.1, 0.1, 0.1, 1.0, 1.0, 1.0]
  max_action: [0.015, 0.015, 0.015, 0.03, 0.03]  # [0.03, 0.03, 0.03, 0.1, 0.1, 0.1]

reward:
  safe_height: 0.04 # 5cm # 10 cm
  w_pos: 30.0
  w_insertion: 300.0 # 100
  w_angle: 6.0
  w_cost: 20 # 20


sim:
  episode_length: 4 # 4 10
  patient_xz_range: [[100, 80, 1.0], [180, 170, 3.0]]
  patient_xz_init_range: [[100, 80, 1.5], [180, 170, 3.0]]
  if_use_ct: True
  us: 'conv'
  ct_range: [-300, 3000]
  vis_us: True
  vis_int: 5
  vis_seg_map: False
  
if_record_traj: True
record_path: /recordings/robot_US_guided_surgery_G1_bm/


